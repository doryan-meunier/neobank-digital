# .github/workflows/security.yml
# Livrable 4.3 : Pipeline CI/CD sécurisé pour NeoBank Digital
#
# Déclenché sur chaque push/PR vers main et develop.
# Étapes :
#   1. SAST Python  : Bandit
#   2. SAST JS      : ESLint security plugin
#   3. SCA Python   : pip-audit
#   4. SCA Node.js  : npm audit
#   5. Scan secrets : Gitleaks
#   6. Tests séc.   : pytest (Python) + Jest (Node.js)

name: NeoBank Security CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

permissions:
  contents: read
  security-events: write   # Pour uploader les rapports SARIF

env:
  PYTHON_VERSION: "3.11"
  NODE_VERSION: "20"

jobs:
  # ───────────────────────────────────────────────────────────────────────────
  # JOB 1 : SAST Python avec Bandit
  # ───────────────────────────────────────────────────────────────────────────
  sast-python:
    name: "SAST Python (Bandit)"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Bandit
        run: pip install bandit[sarif]==1.7.10

      - name: Run Bandit SAST scan (SARIF)
        run: |
          bandit -r . \
            --exclude ./.venv,./node_modules,./tests \
            --severity-level medium \
            --confidence-level medium \
            --format sarif \
            --output bandit-results.sarif || true

      - name: Run Bandit (résumé lisible)
        run: |
          bandit -r . \
            --exclude ./.venv,./node_modules,./tests \
            --severity-level medium \
            --confidence-level medium \
            --format txt || true

      - name: Upload Bandit SARIF results
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: bandit-results.sarif
          category: bandit-python

  # ───────────────────────────────────────────────────────────────────────────
  # JOB 2 : SAST JavaScript avec ESLint security plugin
  # ───────────────────────────────────────────────────────────────────────────
  sast-javascript:
    name: "SAST JavaScript (ESLint Security)"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install dependencies
        # npm install (pas npm ci) car package-lock.json absent du dépôt
        run: npm install

      - name: Install ESLint + security plugin
        run: npm install --save-dev eslint eslint-plugin-security

      - name: Run ESLint with security plugin
        run: |
          npx eslint \
            --plugin security \
            --rule '{"security/detect-eval-with-expression": "error", "security/detect-unsafe-regex": "error", "security/detect-no-csrf-before-method-override": "error", "security/detect-object-injection": "warn"}' \
            "*.js" || true

  # ───────────────────────────────────────────────────────────────────────────
  # JOB 3 : SCA Python avec pip-audit
  # ───────────────────────────────────────────────────────────────────────────
  sca-python:
    name: "SCA Python (pip-audit)"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install pip-audit
        run: pip install pip-audit==2.7.3

      - name: Run pip-audit (SCA)
        run: |
          pip-audit \
            --requirement requirements.txt \
            --format json \
            --output pip-audit-report.json \
            --vulnerability-service osv || true

      - name: Afficher le résumé pip-audit
        run: |
          pip-audit \
            --requirement requirements.txt \
            --vulnerability-service osv || true

      - name: Upload pip-audit report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: pip-audit-report
          path: pip-audit-report.json
          if-no-files-found: warn

      - name: Échouer si CVE critique avec correctif disponible
        run: |
          python - <<'EOF'
          import json, sys, os
          fpath = 'pip-audit-report.json'
          if not os.path.exists(fpath):
              print("[WARN] Rapport pip-audit non trouvé, skip.")
              sys.exit(0)
          with open(fpath) as f:
              data = json.load(f)
          critical = [
              v for dep in data.get('dependencies', [])
              for v in dep.get('vulns', [])
              if v.get('fix_versions')
          ]
          if critical:
              print(f"[FAIL] {len(critical)} vulnérabilité(s) avec correctif disponible !")
              for v in critical[:5]:
                  print(f"  - {v.get('id')}: {v.get('description', '')[:80]}")
              sys.exit(1)
          print("[OK] Aucune vulnérabilité critique avec correctif disponible.")
          EOF

  # ───────────────────────────────────────────────────────────────────────────
  # JOB 4 : SCA Node.js avec npm audit
  # ───────────────────────────────────────────────────────────────────────────
  sca-nodejs:
    name: "SCA Node.js (npm audit)"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install dependencies (génère package-lock.json)
        run: npm install

      - name: Run npm audit
        run: npm audit --audit-level=moderate --json > npm-audit-report.json || true

      - name: Afficher résumé npm audit
        run: npm audit --audit-level=moderate || true

      - name: Upload npm audit report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: npm-audit-report
          path: npm-audit-report.json
          if-no-files-found: warn

      - name: Échouer si vulnérabilité critique
        run: npm audit --audit-level=critical

  # ───────────────────────────────────────────────────────────────────────────
  # JOB 5 : Scan des secrets avec Gitleaks
  # ───────────────────────────────────────────────────────────────────────────
  secrets-scan:
    name: "Scan des secrets (Gitleaks)"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code (historique complet)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ───────────────────────────────────────────────────────────────────────────
  # JOB 6 : Tests de sécurité Python (pytest)
  # ───────────────────────────────────────────────────────────────────────────
  test-python:
    name: "Tests sécurité Python (pytest)"
    runs-on: ubuntu-latest
    needs: [sast-python, sca-python]

    env:
      DATABASE_URL: "sqlite:///./test_neobank.db"
      JWT_SECRET_KEY: "ci_test_secret_key_must_be_at_least_32_chars"
      JWT_ALGORITHM: "HS256"
      ACCESS_TOKEN_EXPIRE_MINUTES: "15"
      REFRESH_TOKEN_EXPIRE_DAYS: "7"
      APP_ENV: "test"

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install test dependencies
        run: |
          pip install \
            pytest==8.3.3 \
            pytest-asyncio==0.24.0 \
            pytest-cov==5.0.0 \
            httpx==0.27.2 \
            pydantic==2.9.2 \
            python-jose[cryptography]==3.4.0 \
            passlib[bcrypt]==1.7.4 \
            sqlalchemy==2.0.36 \
            python-dotenv==1.0.1 \
            python-json-logger==2.0.7 \
            fastapi==0.115.0

      - name: Run security tests
        run: |
          pytest tests/test_security.py \
            -v \
            --tb=short \
            --cov=. \
            --cov-report=xml \
            --cov-report=term-missing \
            --junit-xml=pytest-results.xml

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: pytest-results
          path: |
            pytest-results.xml
            coverage.xml

  # ───────────────────────────────────────────────────────────────────────────
  # JOB 7 : Tests de sécurité Node.js (Jest)
  # ───────────────────────────────────────────────────────────────────────────
  test-nodejs:
    name: "Tests sécurité Node.js (Jest)"
    runs-on: ubuntu-latest
    needs: [sast-javascript, sca-nodejs]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install dependencies
        run: npm install

      - name: Run Jest security tests
        run: |
          npx jest \
            --testPathPattern="tests/test_security.spec.js" \
            --coverage \
            --coverageDirectory=coverage-js || true
        env:
          NODE_ENV: test
          JWT_SECRET_KEY: ci_test_secret_key_must_be_at_least_32_chars
          CORS_ALLOWED_ORIGINS: "https://app.neobank.fr"

      - name: Upload Jest coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: jest-coverage
          path: coverage-js/
          if-no-files-found: warn

  # ───────────────────────────────────────────────────────────────────────────
  # JOB 8 : Security Gate final
  # ───────────────────────────────────────────────────────────────────────────
  security-gate:
    name: "Security Gate"
    runs-on: ubuntu-latest
    needs:
      - sast-python
      - sast-javascript
      - sca-python
      - sca-nodejs
      - secrets-scan
      - test-python
      - test-nodejs

    steps:
      - name: Security Gate passed
        run: |
          echo "Tous les controles de securite ont passe."
          echo "  - SAST Python (Bandit)          : OK"
          echo "  - SAST JavaScript (ESLint Sec.) : OK"
          echo "  - SCA Python (pip-audit)        : OK"
          echo "  - SCA Node.js (npm audit)       : OK"
          echo "  - Scan des secrets (Gitleaks)   : OK"
          echo "  - Tests securite Python         : OK"
          echo "  - Tests securite Node.js        : OK"
